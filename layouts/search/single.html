{{ define "title" }}
  {{ .Title }} · {{ .Site.Title }}
{{ end }}
{{ define "content" }}
<section class="container list">
  <header>
    <h1 class="title">{{ .Title }}</h1>
  </header>
  <div>
    <input type="search" id="search-input" placeholder="Search posts..." style="width:100%;padding:0.6rem;font-size:1.2rem;margin-bottom:1.5rem;" autofocus>
    <ul id="search-results" style="list-style:none;padding:0;font-size:1.1rem;"></ul>
  </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script>
(function() {
  var searchInput = document.getElementById('search-input');
  var resultsList = document.getElementById('search-results');
  var fuse = null;
  var baseOrigin = window.location.origin;
  var basePath = '{{ strings.TrimSuffix "/" .Site.BaseURL }}'.replace(/^https?:\/\/[^/]+/, '');

  fetch('{{ "index.json" | relURL }}')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      data.forEach(function(item) {
        item.permalink = item.permalink.replace(/^https?:\/\/[^/]+/, '');
      });
      fuse = new Fuse(data, {
        keys: ['title', 'summary', 'content'],
        threshold: 0.3,
        ignoreLocation: true,
        minMatchCharLength: 3,
        includeScore: true
      });
    });

  searchInput.addEventListener('input', function() {
    if (!fuse) return;
    var query = this.value.trim();
    if (query.length < 2) {
      resultsList.innerHTML = '';
      return;
    }
    var results = fuse.search(query, { limit: 20 });
    if (results.length === 0) {
      resultsList.innerHTML = '<li>No results found.</li>';
      return;
    }
    var html = '';
    results.forEach(function(r) {
      html += '<li style="margin-bottom:0.6rem"><a href="' + r.item.permalink + '">' + r.item.title + '</a></li>';
    });
    resultsList.innerHTML = html;
  });
})();
</script>
{{ end }}

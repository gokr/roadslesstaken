{{- $dest := .Destination -}}
{{- if and (strings.HasPrefix $dest "/") (not (strings.HasPrefix $dest "//")) -}}
  {{- $url := urls.Parse site.BaseURL -}}
  {{- $path := strings.TrimSuffix "/" $url.Path -}}
  {{- $dest = printf "%s%s" $path $dest -}}
{{- end -}}
<a href="{{ $dest | safeURL }}" {{ with .Title }}title="{{ . }}"{{ end }}{{ if strings.HasPrefix $dest "http" }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .Text | safeHTML }}</a>
